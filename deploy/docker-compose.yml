version: "3.9"
services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/hyperai
      - REDIS_BROKER_URL=redis://redis:6379/0
      - REDIS_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  streamlit:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: bash -lc "pip install -r requirements.txt && streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0"
    env_file:
      - ../.env
    environment:
      - API_BASE=http://api:8000
    depends_on:
      - api
    ports:
      - "8501:8501"

  worker:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: bash -lc "pip install -r requirements.txt && celery -A celery_app.celery_app worker -l info"
    env_file:
      - ../.env
    depends_on:
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hyperai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata: